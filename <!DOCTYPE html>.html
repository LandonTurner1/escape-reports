<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Games</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Inter', sans-serif;
  margin:0;
  padding:0;
  min-height:100vh;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Card */
form {
  background:white;
  border-radius:20px;
  padding:50px 40px;
  width:100%;
  max-width:600px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  gap:25px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
form:hover { transform: translateY(-2px); box-shadow:0 20px 50px rgba(0,0,0,0.15); }

/* Titles */
h1 {
  text-align:center;
  font-size:3rem;
  font-weight:900;
  background: linear-gradient(90deg, #1e40af, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom:10px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.15);
}
h1::after {
  content:"";
  display:block;
  margin:8px auto 0;
  width:80px;
  height:4px;
  background:#3b82f6;
  border-radius:2px;
}
h2 {
  text-align:center;
  font-size:1.2rem;
  font-weight:600;
  color:#4b5563;
  margin-bottom:20px;
}

/* Labels */
label {
  font-weight:600;
  font-size:1rem;
  margin-bottom:6px;
  display:block;
}

/* Inputs & selects */
input, select, textarea, button {
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:2px solid #d1d5db;
  font-size:1rem;
  box-sizing:border-box;
}
textarea { min-height:120px; resize:vertical; }
input:focus, select:focus, textarea:focus { 
  outline:none; 
  border-color:#3b82f6; 
  box-shadow:0 0 0 4px rgba(59,130,246,0.2);
  background:#fff;
}

/* Severity colors */
select[name="severity"] {
  font-weight:600;
  transition: background 0.3s ease, color 0.3s ease;
}
select[name="severity"].low { background:#10b981; color:white; }
select[name="severity"].medium { background:#f59e0b; color:white; }
select[name="severity"].high { background:#ef4444; color:white; }

/* Button */
button {
  background:linear-gradient(90deg,#1e40af,#3b82f6);
  color:white;
  font-weight:700;
  font-size:1.1rem;
  border:none;
  border-radius:14px;
  cursor:pointer;
  padding:14px;
  transition:all 0.2s ease;
}
button:hover {
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* Confirmation toast */
.confirmation {
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:#10b981;
  color:white;
  padding:16px 22px;
  border-radius:14px;
  font-weight:600;
  display:none;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

/* Make selects larger and pill-like */
select {
  padding:14px 20px;
  font-weight:600;
  border-radius:14px;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  cursor:pointer;
  color:#374151;
  background:#f9fafb;
  transition:all 0.2s ease;
}
select:focus { background:#fff; }

</style>
</head>
<body>

<form id="reportForm">
  <h1>Countdown Games</h1>
  <h2>Submit an Issue Report</h2>

  <label>Reporter Name</label>
  <input type="text" name="reporter" placeholder="Your name" required>

  <label>Game Name</label>
  <select name="room" required>
    <option value="" disabled selected>Select game</option>
    <option>Time Bomb</option>
    <option>Shock and Awe</option>
    <option>Pirate Ship</option>
    <option>The Scary One</option>
    <option>Bank Heist</option>
    <option>Pharaohs Curse</option>
    <option>Ghost Town</option>
    <option>Prison Break</option>
    <option>Murder Mansion</option>
    <option>Time Machine</option>
    <option>Supernova</option>
    <option>The Castle</option>
    <option>Abduction</option>
    <option>Jurassic Island</option>
  </select>

  <label>Severity</label>
  <select name="severity" id="severitySelect" required>
    <option value="" disabled selected>Select severity</option>
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>

  <label>Can the game still run?</label>
  <select name="canRun" required>
    <option value="" disabled selected>Select an option</option>
    <option>Yes</option>
    <option>Yes, workaround needed</option>
    <option>No</option>
  </select>

  <label>Short Description</label>
  <textarea name="description" placeholder="Describe the issue..." required></textarea>

  <button type="submit">Submit Report</button>
</form>

<div class="confirmation" id="confirmationMessage">Report submitted successfully!</div>

<script>
// Color code severity
const severitySelect = document.getElementById("severitySelect");
severitySelect.addEventListener("change", (e) => {
  severitySelect.classList.remove("low", "medium", "high");
  const val = e.target.value;
  if(val === "Low") severitySelect.classList.add("low");
  else if(val === "Medium") severitySelect.classList.add("medium");
  else if(val === "High") severitySelect.classList.add("high");
});

// Submit handler
document.getElementById("reportForm").addEventListener("submit", function(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(this).entries());
  console.log("Submitted Issue:", data);

  // Show confirmation
  const conf = document.getElementById("confirmationMessage");
  conf.style.display = "block";

  // Reset form
  this.reset();
  severitySelect.classList.remove("low","medium","high");

  setTimeout(()=>conf.style.display="none",4000);
});
</script>

</body>
</html>
